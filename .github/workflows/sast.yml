name: SAST

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
  pull_request:
    branches:
      - development
    paths:
      - 'Makefile'
      - '.github/workflows/**/*'
      - 'cmd/**/*'
      - 'internal/**/*'
      - 'pkg/**/*'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
  push:
    branches:
      - development
      - main
      - 'release-*.*.*'
    paths:
      - 'Makefile'
      - '.github/workflows/**/*'
      - 'cmd/**/*'
      - 'internal/**/*'
      - 'pkg/**/*'
      - 'go.mod'
      - 'go.sum'
      - 'Docker/**/*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
        
      - name: Autobuild
        run: make build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  dependency-check:
    name: GoVulnCheck Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true
          cache-dependency-path: go.sum

      - name: Install jq (needed for parsing report)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run govulncheck via Makefile
        run: make check-vulnerability

      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: govulncheck-report
          path: .reports/pipelines/security/govulncheck-report.json